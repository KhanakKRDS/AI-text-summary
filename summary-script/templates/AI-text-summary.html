<!DOCTYPE html>

<html lang="en">
<head>
     <meta charset="UTF-8">
     <title> Generate Text Summary </title>
     
	 <style>
	 div {
	     text-align: center;
	 }
     div.container > div {
	     display: inline-block;
		 vertical-align: top;
		 margin: 0 20px; <!-- Adds spacing between the two boxes --> 
		 width: 45%;
	 }

     textarea {
	     resize: none;
	     padding: 20px;
		 color: #ffffdb;
	 }
		
	 h3{
	     font-size: 30px;
	     text-align: center;
		 color: #0779e3;
	 }
	 h1{
	     text-align: center;
		 color: #0779e3;
	 }
	 </style>
</head>

<body>
     <h1>Generate Text Summary with AI</h1>

		First Name:
		<input type= "text" id="first" name="first" size = "30" required>
		<br>

		Last Name:
		<input type= "text" id="last" name="last" size = "30" required>
		<br>
		
<div class = "container">
     <div>		
        <form method = "POST" action = "/process">
		<h3>Please add your text here</h3>
		<!-- Keep original text input, fill with previous input if any -->
		<textarea rows="30" cols="80" id="og" name="og" required>{{og|trim}}</textarea>
		<br>

		<input type="submit" value="Summarize">
		</form>
	 </div>
	
     <div>	
		<h3>Summarized text</h3>
		<!-- Make summary textarea readonly to prevent accidental edits -->
		<textarea rows="30" cols="80" readonly>{{summary|trim}}</textarea>
	 </div>
</div>
		<br>

</body>
</html>
